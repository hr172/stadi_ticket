{% extends "partials/base.html" %}
{% block title %}Group Size{% endblock %}
{% block content %}
<h4 class="fw-bold mb-4"><i class="bi bi-people"></i> Choose Group Size</h4>
<div class="row g-3">
  <div class="col-md-6">
    <form method="POST">
      <button type="submit" name="group_size" value="3"
              class="card w-100 border-success shadow-sm btn btn-outline-light p-0">
        <div class="card-body text-center p-4">
          <div class="display-4 mb-2">3</div>
          <h5 class="fw-bold">Family Pack</h5>
          <p class="text-muted small mb-0">3 consecutive seats — <strong>~10% per-seat discount</strong></p>
          <span class="badge bg-warning text-dark mt-2">80% buyback rate</span>
        </div>
      </button>
    </form>
  </div>
  <div class="col-md-6">
    <form method="POST">
      <button type="submit" name="group_size" value="5"
              class="card w-100 border-primary shadow-sm btn btn-outline-light p-0">
        <div class="card-body text-center p-4">
          <div class="display-4 mb-2">5</div>
          <h5 class="fw-bold">Group Pack</h5>
          <p class="text-muted small mb-0">5 consecutive seats — <strong>~14% per-seat discount</strong></p>
          <span class="badge bg-warning text-dark mt-2">80% buyback rate</span>
        </div>
      </button>
    </form>
  </div>
</div>
{% endblock %}
